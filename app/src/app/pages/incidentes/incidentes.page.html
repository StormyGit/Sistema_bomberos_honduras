<ion-header>
  <ion-toolbar>
    <ion-title>Incidentes</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  @for (i of listIncidente(); track $index) {

    <ion-card>
      <ion-card-header>
        <ion-card-title>HRB-00-T0-000</ion-card-title>
        <ion-card-subtitle>{{i.colonia}}</ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>
        <ion-button [routerLink]="['/incidentes', i.id]">
          Ver Detalles
        </ion-button>
      </ion-card-content>
    </ion-card>
  }

</ion-content>
