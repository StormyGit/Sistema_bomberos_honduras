<ion-header>
  <ion-toolbar style="--background:#0a0a0c; --color:#f5f5f5; --border-color:#262626;">
    <ion-title>Incidentes</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding" style="--background:#0a0a0c; --color:#f5f5f5;">

  <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content
      pullingText="Desliza para actualizar"
      refreshingText="Actualizando..."
    ></ion-refresher-content>
  </ion-refresher>

  @if (errorApi()) {
  <ion-card color="danger">
    <ion-card-content>
      {{ errorApi() }}
    </ion-card-content>
  </ion-card>
}
  <div class="space-y-6">
    @for (i of listIncidente(); track $index) {

      <ion-card ion-no-padding class="!m-0 !bg-neutral-900 !border !border-neutral-800 !rounded-2xl !shadow-none">
        <div class="p-4 flex items-center justify-between gap-3">

          <div class="min-w-0">
            <div class="flex items-center gap-2 mb-1">
              <!-- <span
                class="w-1.5 h-1.5 rounded-full flex-shrink-0"
                [ngClass]="{
                  'bg-amber-400':   i.estado === 'Pendiente',
                  'bg-orange-400':  i.estado === 'En ejecución' || i.estado === 'Activo',
                  'bg-emerald-400': i.estado === 'Finalizado' || i.estado === 'Resuelto' || i.estado === 'Cerrado',
                  'bg-rose-400':    i.estado === 'Cancelado',
                  'bg-neutral-400': !['Pendiente','En ejecución','Activo','Finalizado','Resuelto','Cerrado','Cancelado'].includes(i.estado)
                }"
              ></span>
              <span
                class="text-xs font-semibold uppercase tracking-wide"
                [ngClass]="{
                  'text-amber-400':   i.estado === 'Pendiente',
                  'text-orange-400':  i.estado === 'En ejecución' || i.estado === 'Activo',
                  'text-emerald-400': i.estado === 'Finalizado' || i.estado === 'Resuelto' || i.estado === 'Cerrado',
                  'text-rose-400':    i.estado === 'Cancelado',
                  'text-neutral-400': !['Pendiente','En ejecución','Activo','Finalizado','Resuelto','Cerrado','Cancelado'].includes(i.estado)
                }"
              >{{ i.estado }}</span> -->
            </div>

            <p class="text-white font-semibold text-sm truncate">{{ i.colonia }}</p>
            <p class="text-neutral-500 text-xs font-mono mt-0.5">HRB-00-T0-000</p>
          </div>

          <ion-button
            size="small"
            fill="solid"
            style="--background:#2563eb; --background-hover:#1d4ed8; --border-radius:8px; --box-shadow:none;"
            class="!m-0 flex-shrink-0"
            [routerLink]="['/incidentes', i.id]"
          >
            Ver detalles
          </ion-button>

        </div>
      </ion-card>

    } @empty {

      <div class="flex flex-col items-center justify-center gap-2 py-16 text-neutral-500 text-sm">
        No hay incidentes registrados.
      </div>

    }
  </div>

</ion-content>
