        <div
          [ngClass]="{
              'bg-white': !(bloqueado || disable),
              'bg-gray-300': (bloqueado || disable)
              }"
          class=" border border-gray-200 rounded-2xl shadow-sm p-4 hover:shadow-md transition-all">

          <div class="flex items-start justify-between gap-3 mb-3">
            <div>
              <p class="text-sm font-bold text-gray-800">
                {{ tipo }}
              </p>

              <p class="text-xs text-gray-500">
                {{ descripcion }}
              </p>
            </div>

            <span class="w-8 h-8 rounded-full bg-gray-100 text-gray-500 flex items-center justify-center">
              <svg
                class="w-5 h-5"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M12 7V12L15 14M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </span>
          </div>

          <div class="space-y-3">
            <div>
              <label class="text-xs text-gray-500 font-semibold uppercase">
                Hora
              </label>

              <input
                type="time"
                class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-gray-300 disabled:bg-gray-100 disabled:text-gray-500 disabled:cursor-not-allowed"
                [value]="hora"
                [disabled]="true"
              >
            </div>

            <div class="flex gap-2">
            <button
              type="button"
              class="btn btn-sm btn-blue-soft w-full disabled:opacity-50 disabled:cursor-not-allowed"
              [disabled]="bloqueado || disable"
              (click)="setTimer()"
            >
              {{ bloqueado || disable ? 'Marcado' : 'Marcar ahora' }}
            </button>
            </div>
          </div>

        </div>
