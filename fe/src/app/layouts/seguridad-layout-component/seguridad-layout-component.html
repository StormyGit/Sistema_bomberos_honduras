<div class="flex w-full h-screen overflow-hidden relative">

  <!-- OVERLAY PARA MÓVIL (se muestra solo cuando el sidebar está abierto en pantallas pequeñas) -->
  @if (isSidebarOpen()) {
    <div
      class="fixed inset-0 bg-black/50 z-30 md:hidden"
      (click)="toggleSidebar()"
    ></div>
  }

  <!-- NAVBAR IZQUIERDA -->
  <div
    [class.w-[300px]]="isSidebarOpen()"
    [class.w-0]="!isSidebarOpen()"
    class="
      shrink-0
      bg-black
      shadow-xl shadow-black/20
      overflow-hidden
      transition-all duration-300 ease-in-out

      md:relative md:z-auto
      fixed z-40 h-screen
    "
  >
    <div class="w-[300px] h-full">
      <app-navbar-component />
    </div>
  </div>

  <!-- CONTENEDOR DERECHO -->
  <div class="w-full h-full flex flex-col min-h-0">

    <!-- HEADER -->
    <div
      class="
        relative
        w-full h-20 color-bombero_blue
        shadow-3xl shadow-black/80
        flex items-center
        px-4 md:px-6
        shrink-0
      "
    >
      <!-- BOTÓN TOGGLE SIDEBAR -->
      <button
        type="button"
        (click)="toggleSidebar()"
        class="text-white p-2 rounded hover:bg-white/10 transition-colors shrink-0 z-10"
        aria-label="Mostrar/Ocultar menú"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-6 h-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>

      <!-- LOGOS Y TEXTO CENTRADOS -->
      <div
        class="
          absolute left-1/2 -translate-x-1/2
          flex items-center justify-center
          max-w-[calc(100%-160px)]
        "
      >
        <div class="mr-3 md:mr-6 hidden sm:block">
          <img
            src="/assets/img/icon.png"
            alt="Logo"
            class="w-10 h-10 md:w-15 md:h-15 object-contain"
          >
        </div>

        <div class="text-center">
          <div class="text-lg md:text-3xl text-white font-black">
            {{ Departamento }}
          </div>

          <div class="text-xs md:text-md text-white font-black ">
            {{ Region }}
          </div>
        </div>

        <div class="ml-3 md:ml-6 hidden sm:block">
          <img
            src="/assets/img/icon2.png"
            alt="Logo"
            class="w-10 h-10 md:w-15 md:h-15 object-contain"
          >
        </div>
      </div>

      <!-- FECHA Y HORA A LA DERECHA -->
      <div class="absolute right-2 md:right-6 text-right text-white hidden sm:block">
        <div class="text-xs md:text-sm font-bold">
          {{ fechaHoraActual() | date:"EEEE, d 'de' MMMM 'de' y" }}
        </div>

        <div class="text-lg md:text-2xl font-black">
          {{ fechaHoraActual() | date:'hh:mm a' }}
        </div>
      </div>
    </div>
    <!-- HEADER -->

    <!-- BODY -->
    <div class="flex-1 min-h-0 min-w-0 overflow-y-auto overflow-x-hidden p-4 back text-white">
      <router-outlet />
    </div>
    <!-- BODY -->
  </div>
</div>
