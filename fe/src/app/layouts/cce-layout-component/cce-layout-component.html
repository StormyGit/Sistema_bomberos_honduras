<div class="flex w-full h-screen overflow-hidden">
  <!-- NAVBAR IZQUIERDA -->
  <div
    class="
      w-[300px] shrink-0
      bg-black
      shadow-xl shadow-black/20
      overflow-hidden

    "
  >
    <app-navbar-component />
  </div>

  <!-- CONTENEDOR DERECHO -->
  <div class="w-full h-full flex flex-col min-h-0">
    <!-- HEADER -->
    <div
      class="
        w-full h-20 color-bombero
        shadow-3xl shadow-black/80
        flex items-center px-6
        justify-between
        shrink-0
      "
    >
      <div class="flex">


        <div class="mr-5">
          <img src="/assets/img/icon.png" alt="Logo" class="w-15 h-15 object-cover">
        </div>

        <div>
          <span class="text-3xl text-white font-black">
            {{ Departamento }}
          </span>
          <br>
          <span class="text-md text-white font-black">
            {{ Region }}
          </span>
        </div>

      </div>

        <div class="ml-auto text-right text-white">
          <div class="text-sm font-bold">
            {{ fechaHoraActual | date:"EEEE, d 'de' MMMM 'de' y" }}
          </div>

          <div class="text-2xl font-black">
            {{ fechaHoraActual | date:'hh:mm a' }}
          </div>
        </div>

    </div>
    <!-- HEADER -->

    <!-- BODY -->
    <div
      class="
        flex-1
        min-h-0
        overflow-y-auto
        p-4
        back
        text-white
      "

    >
      <router-outlet />
    </div>
    <!-- BODY -->
  </div>
</div>
