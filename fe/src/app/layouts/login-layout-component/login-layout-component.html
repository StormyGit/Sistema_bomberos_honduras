<div class="relative w-full h-screen overflow-hidden bg-black flex items-center justify-center px-4">

  <!-- FRANJA SUPERIOR DE ACENTO -->
  <div class="absolute top-0 left-0 w-full h-2 color-bombero"></div>

  <!-- BLOQUE DE FONDO DECORATIVO -->
  <div class="absolute -top-24 -right-24 w-96 h-96 rounded-full color-bombero opacity-10 blur-3xl"></div>
  <div class="absolute -bottom-24 -left-24 w-96 h-96 rounded-full color-bombero opacity-10 blur-3xl"></div>

  <!-- TARJETA DE LOGIN -->
  <div class="relative w-full max-w-md bg-neutral-900 border border-white/10 rounded-2xl shadow-2xl shadow-black/60 p-8">

    <!-- LOGO Y ENCABEZADO -->
    <div class="flex flex-col items-center mb-8">
      <img
        src="/assets/img/icon2.png"
        alt="Logo"
        class="w-20 h-20 object-contain mb-3"
      >
      <div class="text-2xl text-white font-black text-center">
        Cuerpo de Bomberos
      </div>
    </div>

    <div class="mb-6 text-center">
      <h1 class="text-xl text-white font-bold">Iniciar sesión</h1>
      <p class="text-sm text-white/50">Ingresa tus credenciales para continuar</p>
    </div>

    <!-- MENSAJE DE ERROR -->
    @if (errorMessage) {
      <div class="mb-4 px-4 py-3 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-sm">
        {{ errorMessage }}
      </div>
    }

    <!-- FORMULARIO -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">

      <!-- USUARIO -->
      <div>
        <label for="usuario" class="block text-sm font-semibold text-white/70 mb-1">
          Usuario
        </label>
        <input
          id="usuario"
          type="text"
          formControlName="correo"
          autocomplete="username"
          placeholder="Ingresa tu usuario"
          class="w-full px-4 py-2.5 rounded-lg bg-black/40 border border-white/10 text-white placeholder-white/30
                 focus:outline-none focus:ring-2 focus:ring-white/30 transition"
        >
        @if (usuario?.invalid && usuario?.touched) {
          <span class="text-xs text-red-400 mt-1 block">El usuario es obligatorio</span>
        }
      </div>

      <!-- CONTRASEÑA -->
      <div>
        <label for="password" class="block text-sm font-semibold text-white/70 mb-1">
          Contraseña
        </label>
        <div class="relative">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            autocomplete="current-password"
            placeholder="Ingresa tu contraseña"
            class="w-full px-4 py-2.5 pr-12 rounded-lg bg-black/40 border border-white/10 text-white placeholder-white/30
                   focus:outline-none focus:ring-2 focus:ring-white/30 transition"
          >
          <button
            type="button"
            (click)="togglePassword()"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-white/40 hover:text-white/70 text-xs font-semibold"
          >
            {{ showPassword ? 'Ocultar' : 'Mostrar' }}
          </button>
        </div>
        @if (password?.invalid && password?.touched) {
          <span class="text-xs text-red-400 mt-1 block">Mínimo 4 caracteres</span>
        }
      </div>

      <!-- RECORDARME / OLVIDÉ CONTRASEÑA -->
      <!-- <div class="flex items-center justify-between text-sm">
        <label class="flex items-center gap-2 text-white/60 cursor-pointer">
          <input type="checkbox" formControlName="recordarme" class="accent-current color-bombero">
          Recordarme
        </label>
        <a href="#" class="text-white/60 hover:text-white transition">¿Olvidaste tu contraseña?</a>
      </div> -->

      <!-- BOTÓN -->
      <button
        type="submit"
        [disabled]="loading()"
        class="mt-2 w-full py-2.5 rounded-lg color-bombero text-white font-bold
               hover:opacity-90 active:scale-[0.99] transition disabled:opacity-50 disabled:cursor-not-allowed
               flex items-center justify-center gap-2"
      >
        @if (loading()) {
          <span class="w-4 h-4 border-2 border-white/40 border-t-white rounded-full animate-spin"></span>
        }
        {{ loading() ? 'Ingresando...' : 'Ingresar' }}
      </button>
    </form>
  </div>
</div>
