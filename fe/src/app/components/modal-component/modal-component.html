@if (show) {
  <!-- FONDO OSCURO -->
  <div
    class="
      fixed inset-0 z-50
      bg-black/90
      flex items-center justify-center
      p-0
    "
    (click)="clickBackdrop()"
  >

    <!-- CONTENEDOR MODAL -->
    <div
      class="
        bg-[#14181D] rounded-2xl shadow-2xl
        max-h-screen
        max-w-screen
        overflow-hidden
        flex flex-col
        border border-gray-200/10
      "
      [style.width]="fullscreen ? '100%' : width"
      [style.height]="fullscreen ? '100%' : height"
      (click)="stopPropagation($event)"
    >

      <!-- HEADER -->
      @if (showHeader) {
        <div
          class="
            flex items-center justify-between
            px-5 py-3
            border-b border-gray-200/10
          "
        >
          <h2 class="text-xl font-bold text-gray-100">
            {{ titulo }}
          </h2>

          @if (showCloseButton) {
            <div class="flex space-x-2">
              <button
                type="button"
                class="
                  w-8 h-8 rounded-full
                  flex items-center justify-center
                  bg-gray-700 hover:bg-gray-600
                  text-gray-200 font-bold
                "
                (click)="fullscreen = !fullscreen"
              >
                <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path
                    d="M21 9V8C21 5.79086 18.9853 4 16.5 4H15.25M21 15V16C21 18.2091 18.9853 20 16.5 20H15.25M3 15V16C3 18.2091 5.01472 20 7.5 20H8.75M3 9V8C3 5.79086 5.01472 4 7.5 4H8.75"
                    stroke="white"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </button>
              <button
                type="button"
                class="
                  w-8 h-8 rounded-full
                  flex items-center justify-center
                  bg-gray-700 hover:bg-gray-600
                  text-gray-200 font-bold
                "
                (click)="closeModal()"
              >
                ×
              </button>
            </div>
          }
        </div>
      }

      <!-- BODY -->
      <div class="p-5 overflow-auto text-gray-200">
        <ng-content></ng-content>
      </div>

    </div>
  </div>
}
