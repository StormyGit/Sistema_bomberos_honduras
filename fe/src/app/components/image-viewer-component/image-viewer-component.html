<!-- Miniatura clickeable -->
<div
  class="cursor-pointer rounded-lg overflow-hidden bg-[#0f1319] border border-gray-200/20 group relative"
  (click)="abrirModal()"
>
  <img
    [src]="src"
    [alt]="nombre"
    [class]="thumbnailClass"
  />

  <div class="absolute inset-0 bg-black/0 group-hover:bg-black/40 transition-all duration-200 flex items-center justify-center">
    <span class="text-white text-xs font-semibold opacity-0 group-hover:opacity-100 transition-opacity duration-200 bg-black/60 px-3 py-1.5 rounded-lg">
      Ver imagen
    </span>
  </div>
</div>

<!-- Modal propio -->
@if (showModal()) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4"
    (click)="onBackdropClick($event)"
  >
    <div class="relative max-w-5xl w-full max-h-[90vh] flex flex-col bg-[#14181D] border border-gray-200/20 rounded-2xl shadow-xl overflow-hidden">

      <!-- Header -->
      <div class="flex items-center justify-between px-5 py-3 border-b border-gray-200/20">
        <p class="text-sm font-bold text-gray-100 truncate pr-4">
          {{ nombre }}
        </p>

        <button
          type="button"
          class="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:text-white hover:bg-gray-500/10 transition-all duration-200"
          (click)="cerrarModal()"
        >
          <span class="text-xl leading-none">&times;</span>
        </button>
      </div>

      <!-- Imagen -->
      <div class="flex-1 overflow-auto flex items-center justify-center bg-black/30 p-4">
        <img
          [src]="src"
          [alt]="nombre"
          class="max-w-full max-h-[70vh] object-contain rounded-lg"
        />
      </div>

      <!-- Footer -->
      <div class="flex items-center justify-end gap-2 px-5 py-3 border-t border-gray-200/20">
        <button
          type="button"
          class="text-xs font-semibold bg-gray-500/10 border border-gray-400/30 text-gray-300 px-4 py-2 rounded-lg hover:bg-gray-500/20 transition-all duration-200"
          (click)="cerrarModal()"
        >
          Cerrar
        </button>

        <button
          type="button"
          class="text-xs font-semibold bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-500 transition-all duration-200 flex items-center gap-1.5"
          (click)="descargar()"
        >
          Descargar
        </button>
      </div>

    </div>
  </div>
}
