<div class="h-full min-h-0 border border-white/10 bg-black/40 flex flex-col overflow-hidden">

  <!-- HEADER DEL MENÚ -->
  <div class="p-4 border-b border-white/10 shrink-0">
    <div class="flex items-center gap-3">
      <div
        class="
          w-12 h-12
          bg-gradient-to-br from-[#E4572E] to-red-700
          rounded-2xl
          shadow-lg shadow-red-900/30
          flex items-center justify-center
        "
      >
        <span class="text-white font-black text-lg">C</span>
      </div>

      <div class="text-white">
        <div class="font-black text-lg leading-tight">
          Admin
        </div>
        <div class="text-xs text-white/50 font-semibold">
          Estación ##
        </div>
      </div>
    </div>
  </div>

  <!-- LISTA CON SCROLL -->
  <div
    class="
      flex-1
      min-h-0
      overflow-y-auto
      p-3
      space-y-2
      scrollbar-thin
      scrollbar-thumb-white/20
      scrollbar-track-transparent
    "
  >

    @for (i of listButtons; track $index) {

      <!-- BOTÓN PRINCIPAL -->
      <div
        class="
          group
          bg-white/5
          hover:bg-[#E4572E]/20
          border border-white/10
          hover:border-[#E4572E]/70
          text-white
          p-3
          rounded-xl
          cursor-pointer
          flex justify-between items-center
          transition-all duration-200
          shadow-sm
        "
        (click)="clickButton(i, $index)"
      >
        <span class="font-semibold text-sm">
          {{ i.name }}
        </span>

        @if (i.child && i.child.length > 0) {
          <span
            class="
              text-xs text-white/60
              group-hover:text-white
              transition
            "
          >
            {{ isOpen($index) ? '▲' : '▼' }}
          </span>
        }
      </div>

      <!-- HIJOS / DESPLEGABLE -->
      @if (i.child && i.child.length > 0 && isOpen($index)) {

        <div class="ml-3 pl-3 border-l border-white/10 space-y-1">

          @for (child of i.child; track child.path) {

            <div
              class="
                p-2.5
                rounded-lg
                cursor-pointer
                text-sm
                font-semibold
                transition-all duration-200
              "
              [class.bg-[#E4572E]]="isActive(child.path)"
              [class.text-white]="isActive(child.path)"
              [class.shadow-lg]="isActive(child.path)"
              [class.shadow-red-900/30]="isActive(child.path)"

              [class.bg-white/5]="!isActive(child.path)"
              [class.text-white/70]="!isActive(child.path)"
              [class.hover:bg-white/10]="!isActive(child.path)"
              [class.hover:text-white]="!isActive(child.path)"

              (click)="irPagina(child.path)"
            >
              {{ child.name }}
            </div>

          }

        </div>

      }

    }

  </div>

  <!-- FOOTER DEL MENÚ -->
  <div class="p-3 border-t border-white/10 shrink-0">

    <app-popover
      position="top"
      align="end"
      panelClass="w-full"
    >

      <!-- BOTÓN QUE ABRE EL POPOVER -->
      <button
        popoverTrigger
        type="button"
        class="
          w-full
          rounded-xl
          bg-white/5
          hover:bg-white/10
          border border-white/10
          hover:border-[#E4572E]/60
          p-3
          text-left
          transition-all duration-200
          flex items-center justify-between
        "
      >
        <div>
          <div class="text-xs text-white/50 font-semibold">
            Mas
          </div>
        </div>

        <span class="text-white/50 text-xs">
          ▲
        </span>
      </button>

      <!-- CONTENIDO DEL POPOVER -->
      <div popoverContent>

        <button
          class="
            w-full
            px-4 py-3
            text-left
            text-sm
            text-white/80
            hover:bg-white/10
            hover:text-white
            transition
            flex items-center gap-2
          "
        >
          <!-- <span>❓</span> -->
          <span>Ayuda</span>
        </button>

        <button
          class="
            w-full
            px-4 py-3
            text-left
            text-sm
            text-white/80
            hover:bg-white/10
            hover:text-white
            transition
            flex items-center gap-2
          "
        >
          <!-- <span>⚙️</span> -->
          <span>Opciones</span>
        </button>

        <div class="border-t border-white/10"></div>

        <button
          class="
            w-full
            px-4 py-3
            text-left
            text-sm
            text-red-400
            hover:bg-red-500/10
            hover:text-red-300
            transition
            flex items-center gap-2
          "
        >
          <!-- <span>🚪</span> -->
          <span>Cerrar sesión</span>
        </button>

      </div>

    </app-popover>

  </div>

</div>
