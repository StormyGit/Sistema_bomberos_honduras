<div class="w-full overflow-x-auto rounded-2xl bg-[#14181D] p-3">

  <!-- BUSCADOR -->
  <div class="mb-3 flex justify-end">
    <div class="relative w-full sm:w-72">
      <input
        type="text"
        placeholder="Buscar..."
        (input)="applyFilter($event)"
        class="
          w-full
          bg-gray-800 border border-gray-200/20
          text-gray-100 placeholder-gray-500
          text-sm rounded-lg
          pl-9 pr-3 py-2
          focus:outline-none focus:ring-2 focus:ring-red-600/50
        "
      >
      <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm">
        🔍
      </span>
    </div>
  </div>

  <table mat-table [dataSource]="dataSource" class="w-full custom-dark-table">

    <ng-container
      *ngFor="let column of columns"
      [matColumnDef]="column.key"
    >
      <th mat-header-cell *matHeaderCellDef>
        {{ column.label }}
      </th>

      <td mat-cell *matCellDef="let element">

        <ng-container [ngSwitch]="column.type">

          <app-badge-component
            *ngSwitchCase="'badge'"
            [estado]="element[column.key]"
          ></app-badge-component>

          <span *ngSwitchDefault>
            {{ element[column.key] || '-' }}
          </span>
        </ng-container>

      </td>
    </ng-container>

    <!-- Columna de acciones -->
    <ng-container [matColumnDef]="'__actions'" *ngIf="actions.length > 0">
      <th mat-header-cell *matHeaderCellDef>
        Acciones
      </th>

      <td mat-cell *matCellDef="let element; let i = index">
        <div class="flex items-center gap-2">

          <ng-container *ngFor="let action of actions">

            <button
              *ngIf="isActionVisible(action, element)"
              type="button"
              [disabled]="isActionDisabled(action, element)"
              (click)="onActionClick(action, element, i)"
              class="botton"
              [ngClass]="action.class"
            >
              {{ action.label }}
            </button>

          </ng-container>

        </div>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    <!-- Sin resultados -->
    <tr class="mat-row" *matNoDataRow>
      <td class="p-4 text-center text-gray-500 text-sm" [attr.colspan]="displayedColumns.length">
        No se encontraron resultados
      </td>
    </tr>

  </table>

  <mat-paginator
    class="custom-dark-paginator"
    [pageSizeOptions]="[1, 5, 10, 20, 50]"
    [pageSize]="10"
    showFirstLastButtons
    aria-label="Paginación de tabla">
  </mat-paginator>

</div>
